<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fort - Light & Sound Show</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
        }

        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease-out;
        }

        #layer-day { z-index: 10; opacity: 1; }
        #layer-evening { z-index: 20; opacity: 0; }
        #layer-night { z-index: 30; opacity: 0; }

        /* Pre-video Spotlight */
        #spotlight {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 40;
            opacity: 0;
            mix-blend-mode: overlay;
            pointer-events: none;
            transition: opacity 0.1s ease-out;
            background: radial-gradient(circle 250px at var(--mouse-x) var(--mouse-y), rgba(255, 230, 150, 0.4), transparent 100%);
        }

        /* Video Layer */
        #layer-video {
            z-index: 50;
            opacity: 0; 
            pointer-events: none;
            transition: opacity 2s ease-in-out; 
        }

        /* Artwork Mask Layer */
        #layer-post-video {
            z-index: 60; 
            opacity: 0;  
            pointer-events: none;
            transition: opacity 1.5s ease-in-out;
            
            -webkit-mask-image: radial-gradient(circle 250px at var(--mouse-x) var(--mouse-y), black 40%, transparent 80%);
            mask-image: radial-gradient(circle 250px at var(--mouse-x) var(--mouse-y), black 40%, transparent 80%);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }

        /* UI Elements */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            pointer-events: none; 
        }

        .top-nav {
            position: absolute;
            top: 40px;
            left: 40px;
            pointer-events: auto; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
        }

        #back-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 10px 24px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            width: fit-content;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        #back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            transform: translateX(-3px); 
        }

        #start-btn {
            pointer-events: auto;
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 18px 45px;
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #start-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
            transform: translateX(-50%) translateY(0) scale(1.02);
        }

        #start-btn.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .volume-wrapper {
            pointer-events: auto;
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            opacity: 0; 
            visibility: hidden;
            transition: opacity 1s ease, visibility 1s;
        }
        
        .volume-wrapper.show { 
            opacity: 1; 
            visibility: visible;
        }

        .vol-icon {
            color: white;
            font-size: 12px;
            letter-spacing: 2px;
            opacity: 0.8;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        .slider-container {
            width: 30px;
            height: 150px;
            position: relative;
        }

        input[type="range"] {
            position: absolute;
            top: 60px;
            left: -60px;
            width: 150px;
            height: 4px;
            transform: rotate(-90deg);
            background: rgba(255,255,255,0.3);
            appearance: none;
            outline: none;
            border-radius: 2px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            cursor: pointer;
        }

        .instruction {
            position: absolute;
            bottom: 40px; 
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: opacity 0.5s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>

    <div class="scene">
        <img id="layer-day" class="layer" src="day.jpg" alt="Day">
        <img id="layer-evening" class="layer" src="evening.jpg" alt="Evening">
        <img id="layer-night" class="layer" src="night.jpg" alt="Night">
        
        <div id="spotlight"></div>
        <video id="layer-video" class="layer" src="projection.mp4" playsinline></video>
        
        <img id="layer-post-video" class="layer" src="artwork.jpg" alt="Artwork Mask">
    </div>

    <div id="ui-layer">
        <div class="top-nav">
            <div class="nav-title">Light and Sound Experience</div>
            <a href="../index.html#section-home-scrolling-text" id="back-btn">← BACK</a>

        </div>

        <div id="instruction" class="instruction">Move Mouse Up & Down to Change Time</div>
        
        <button id="start-btn">start light & show</button>

        <div class="volume-wrapper" id="volume-wrapper">
            <span class="vol-icon">VOLUME</span>
            <div class="slider-container">
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
        <!-- Bottom-right © CMS link -->
        <a href="../cms-login.html" id="cms-footer-link" style="
            position:absolute;
            bottom:28px;
            right:32px;
            pointer-events:auto;
            color:rgba(255,255,255,0.35);
            font-family:'Montserrat',sans-serif;
            font-size:11px;
            letter-spacing:2px;
            text-decoration:none;
            text-transform:uppercase;
            transition:color 0.3s;
            user-select:none;
        " onmouseover="this.style.color='rgba(217,138,41,0.8)'" onmouseout="this.style.color='rgba(255,255,255,0.35)'">
            © 2026 Sandeep Patel · Creative Studio
        </a>
    </div>

    <script>
        const evening = document.getElementById('layer-evening');
        const night = document.getElementById('layer-night');
        const spotlight = document.getElementById('spotlight');
        const video = document.getElementById('layer-video');
        const postVideoLayer = document.getElementById('layer-post-video');
        const startBtn = document.getElementById('start-btn');
        const volumeWrapper = document.getElementById('volume-wrapper');
        const volumeSlider = document.getElementById('volume-slider');
        const instruction = document.getElementById('instruction');
        const backBtn = document.getElementById('back-btn');

        let showActive = false;
        let videoEnded = false;

        backBtn.addEventListener('click', (e) => {
            if (window.history.length > 1) {
                e.preventDefault();
                window.history.back();
            }
        });

        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            // Tracking coordinates for the masking flashlight effect
            document.documentElement.style.setProperty('--mouse-x', `${x}px`);
            document.documentElement.style.setProperty('--mouse-y', `${y}px`);

            if (videoEnded) return; 
            if (showActive) return; 

            // Day/Night transitions
            const yRatio = y / window.innerHeight;

            let eveningOpacity = Math.min(1, Math.max(0, yRatio * 2));
            let nightOpacity = Math.min(1, Math.max(0, (yRatio - 0.5) * 2));

            evening.style.opacity = eveningOpacity;
            night.style.opacity = nightOpacity;
            spotlight.style.opacity = nightOpacity;

            if (yRatio > 0.85) {
                startBtn.classList.add('show');
                instruction.style.opacity = '0';
            } else {
                startBtn.classList.remove('show');
                instruction.style.opacity = '1';
                instruction.innerText = "Move Mouse Up & Down to Change Time";
            }
        });

        startBtn.addEventListener('click', () => {
            showActive = true; 

            startBtn.classList.remove('show');
            instruction.style.opacity = '0';
            spotlight.style.opacity = 0;
            
            video.style.opacity = 1;
            volumeWrapper.classList.add('show');

            setTimeout(() => {
                video.play();
                video.volume = volumeSlider.value;
            }, 100);
        });

        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
        });

        // Event for when video ends
        video.addEventListener('ended', () => {
            videoEnded = true; 
            showActive = false; 
            
            video.style.opacity = 0;
            volumeWrapper.classList.remove('show');

            // Revealing the .jpg artwork layer with the mouse spotlight!
            postVideoLayer.style.opacity = 1;
            
            instruction.innerText = window._lnsPostInstruction || "Explore the Artwork with Your Mouse";
            instruction.style.opacity = '1';
        });

        // © CMS link: go to Light & Sound CMS if authenticated, else login page
        (function(){
            const cmsLink = document.getElementById('cms-footer-link');
            if(cmsLink){
                if(typeof CMSAuth !== 'undefined' && CMSAuth.isAuthenticated()){
                    cmsLink.href = 'cms.html';
                } else {
                    // After login, redirect back here and then on to cms.html
                    cmsLink.href = '../cms-login.html?redirect=' + encodeURIComponent('light-and-sound-show/cms.html');
                }
            }
        })();
    </script>
