<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Login | Sandeep Patel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="js/cms-auth.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent:       #D98A29;
            --accent-glow:  rgba(217, 138, 41, 0.18);
            --bg:           #0B0B0B;
            --surface:      #111111;
            --border:       rgba(255,255,255,0.08);
            --text:         #F8F9FA;
            --muted:        #8F929D;
            --error:        #E05C5C;
            --success:      #4CAF84;
            --font-heading: 'Cormorant Garamond', serif;
            --font-sans:    'Inter', sans-serif;
            --font-mono:    'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Subtle background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(217,138,41,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(217,138,41,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow blob */
        body::after {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(ellipse, rgba(217,138,41,0.06) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3rem 3.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 0.02em;
            color: var(--text);
            margin-bottom: 0.3rem;
        }

        .login-subtitle {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .login-divider {
            width: 32px; height: 1px;
            background: var(--accent);
            margin-bottom: 2.5rem;
        }

        .field-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-login {
            width: 100%;
            margin-top: 1.75rem;
            background: var(--accent);
            color: #000;
            border: 1px solid var(--accent);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .btn-login:hover { background: transparent; color: var(--accent); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .msg {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-size: 0.82rem;
            font-family: var(--font-sans);
            display: none;
        }

        .msg.error   { background: rgba(224,92,92,0.12); border: 1px solid rgba(224,92,92,0.3); color: var(--error); display: block; }
        .msg.success { background: rgba(76,175,132,0.12); border: 1px solid rgba(76,175,132,0.3); color: var(--success); display: block; }

        .login-footer {
            margin-top: 2.5rem;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: var(--font-mono);
            text-align: center;
            letter-spacing: 0.05em;
        }

        /* Shake animation on error */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60%  { transform: translateX(-6px); }
            40%,80%  { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.75rem; }
        }
    </style>
</head>
<body>

    <div class="login-card" id="loginCard">
        <div class="login-logo">Sandeep Patel</div>
        <div class="login-subtitle">CMS Admin Access</div>
        <div class="login-divider"></div>

        <div class="field-group">
            <label for="cms_user">Username</label>
            <input type="text" id="cms_user" autocomplete="username" placeholder="Enter username" spellcheck="false">
        </div>

        <div class="field-group">
            <label for="cms_pass">Password</label>
            <input type="password" id="cms_pass" autocomplete="current-password" placeholder="Enter password">
        </div>

        <div class="msg" id="loginMsg"></div>

        <button class="btn-login" id="loginBtn" onclick="doLogin()">Enter CMS</button>

        <div class="login-footer">© 2026 Sandeep Patel ·&mdash; Creative Studio</div>
    </div>

    <script>
        // Read optional redirect target from URL param (e.g. ?redirect=light-and-sound-show/cms.html)
        var _redirectTarget = (function(){
            try {
                var params = new URLSearchParams(window.location.search);
                var r = params.get('redirect');
                if (r && !r.startsWith('http') && !r.includes('..')) return r;
            } catch(e) {}
            return 'admin.html';
        })();

        // If already authenticated, go straight to the intended destination
        if (window.CMSAuth && window.CMSAuth.isAuthenticated()) {
            window.location.replace(_redirectTarget);
        }

        // Allow Enter key to submit
        document.getElementById('cms_user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('cms_pass').focus(); });
        document.getElementById('cms_pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        async function doLogin() {
            const btn  = document.getElementById('loginBtn');
            const msg  = document.getElementById('loginMsg');
            const user = document.getElementById('cms_user').value.trim();
            const pass = document.getElementById('cms_pass').value;
            const card = document.getElementById('loginCard');

            msg.className = 'msg';
            msg.textContent = '';

            if (!user || !pass) {
                msg.className = 'msg error';
                msg.textContent = 'Username aur password dono zaruri hain.';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Verifying…';

            const ok = await window.CMSAuth.login(user, pass);

            if (ok) {
                btn.innerHTML = '? Access Granted';
                btn.style.background = '#4CAF84';
                btn.style.borderColor = '#4CAF84';
                setTimeout(() => { window.location.replace(_redirectTarget); }, 600);
            } else {
                btn.disabled = false;
                btn.innerHTML = 'Enter CMS';
                msg.className = 'msg error';
                msg.textContent = 'Galat username ya password. Dobara try karein.';
                card.classList.remove('shake');
                void card.offsetWidth;
                card.classList.add('shake');
                document.getElementById('cms_pass').value = '';
                document.getElementById('cms_pass').focus();
            }
        }
    </script>
</body>
</html>
