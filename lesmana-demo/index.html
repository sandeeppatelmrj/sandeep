<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandeep. - Graphic Designer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <a href="javascript:history.back()" class="back-link">
            <span class="icon-arrow-left">←</span> Back
        </a>

        <button class="btn-primary btn-nav">
            <span class="icon-arrow">→</span> Start a project
        </button>
    </header>

    <main class="hero">
        <div class="carousel-container">
            <div class="carousel-track">
                <div class="carousel-item"><img src="https://images.unsplash.com/photo-1607252650355-f7fd0460ccdb?q=80&w=600&auto=format&fit=crop" alt="UI 1"></div>
                <div class="carousel-item"><img src="https://images.unsplash.com/photo-1616423640778-28d1b53229bd?q=80&w=600&auto=format&fit=crop" alt="UI 2"></div>
                <div class="carousel-item"><img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=600&auto=format&fit=crop" alt="UI 3"></div>
                <div class="carousel-item"><img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=600&auto=format&fit=crop" alt="UI 4"></div>
                <div class="carousel-item"><img src="https://images.unsplash.com/photo-1541560052-5e137f229371?q=80&w=600&auto=format&fit=crop" alt="UI 5"></div>
                <div class="carousel-item"><img src="https://images.unsplash.com/photo-1586716168854-52d3c7343d9c?q=80&w=600&auto=format&fit=crop" alt="UI 6"></div>
                <div class="carousel-item"><img src="https://images.unsplash.com/photo-1618761714954-0b8cd0026356?q=80&w=600&auto=format&fit=crop" alt="UI 7"></div>
            </div>
        </div>
        
        <div class="gradient-overlay-bottom"></div>

        <div class="model-container">
            <img src="sandeep.png" alt="Sandeep Portrait">
        </div>
        
        <div class="hero-content">
            <div class="hero-left">
                <p class="greeting">HI, I'M SANDEEP</p>
                <h1 class="title">Graphic<br>Designer</h1>
                <button class="btn-primary btn-large">
                    <span class="icon-arrow">→</span> Start a project
                </button>
            </div>
            
            <div class="hero-right">
                <p class="quote">"I help brands transform ideas into<br><strong>impactful visual experiences</strong> using strategy,<br>creativity, and AI—not just pretty graphics."</p>
                <div class="signature">
                    Sandeep
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
